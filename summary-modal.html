<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; width: 100vw; height: 100vh; display: grid; place-items: center; background: rgba(24,24,27,.22); backdrop-filter: blur(3px); }
    .frame { width: min(980px, calc(100vw - 100px)); height: min(720px, calc(100vh - 80px)); border: 1px solid #e4e4e0; border-radius: 16px; background: #fafaf9; box-shadow: 0 28px 70px rgba(0,0,0,.22); pointer-events: none; overflow: hidden; }
    header { height: 52px; display: flex; align-items: center; gap: 10px; padding: 0 16px 0 20px; border-radius: 16px 16px 0 0; border-bottom: 1px solid #e4e4e0; background: rgba(250,250,249,.98); color: #27272a; pointer-events: auto; }
    h1 { margin: 0; font-size: 15px; font-weight: 650; flex: 1; }
    #status { color: #71717a; font-size: 12px; }
    .close { width: 28px; height: 28px; border: 1px solid #e4e4e0; border-radius: 50%; background: transparent; color: #71717a; cursor: pointer; font-size: 18px; }
    .loading { height: calc(100% - 52px); display: grid; place-items: center; color: #a1a1aa; font-size: 13px; }
    .spinner { width: 22px; height: 22px; margin: 0 auto 12px; border: 2px solid #e4e4e0; border-top-color: #71717a; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-color-scheme: dark) { body { background: rgba(0,0,0,.38); } .frame { background: #292929; border-color: #52525b; box-shadow: 0 28px 70px rgba(0,0,0,.6); } header { background: #292929; border-color: #454545; color: #f4f4f5; } #status { color: #a1a1aa; } .close { color: #d4d4d8; border-color: #52525b; } .spinner { border-color: #454545; border-top-color: #d4d4d8; } }
  </style>
</head>
<body>
  <section class="frame">
    <header>
      <h1>多模型综合提炼</h1>
      <span id="status">正在创建独立会话…</span>
      <button class="close" title="关闭独立会话" onclick="window.summaryTask.close()">×</button>
    </header>
    <div class="loading"><div><div class="spinner"></div>正在后台准备独立会话…</div></div>
  </section>
  <script>
    window.summaryTask.onUpdate((task) => {
      document.getElementById('status').textContent = task.message || '独立会话已就绪';
    });
    window.summaryTask.ready();
  </script>
</body>
</html>
