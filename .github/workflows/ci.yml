name: Validate

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript syntax
        run: npm run check

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  build-windows:
    if: github.event_name == 'push'
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer and portable package
        run: npm run make:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v6
        with:
          name: AI-Portal-Windows-Installer-${{ github.sha }}
          path: out/make/squirrel.windows/x64/AI-Portal-Setup.exe
          if-no-files-found: error
          retention-days: 14

      - name: Upload Windows portable package
        uses: actions/upload-artifact@v6
        with:
          name: AI-Portal-Windows-Portable-${{ github.sha }}
          path: out/make/zip/win32/x64/*.zip
          if-no-files-found: error
          retention-days: 14
